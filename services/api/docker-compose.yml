name: home-telemetry

services:
  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
    container_name: home-telemetry-api
    ports:
      - "8000:8000"
    env_file:
      - app/.env
    environment:
      DATABASE_HOST: home-telemetry-timescaledb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://api:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - home-telemetry

networks:
  home-telemetry:
    external: true
