# Sample redis.conf for development

# Network
bind 0.0.0.0
port 6379
# need to test with protected mode yes on docker
protected-mode no

# Security
# requirepass yourpassword

# Persistence
save 900 1
save 300 10
save 60 10000
dir /data
# appendonly yes

# Memory management
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# Logging
logfile ""
loglevel notice

# Databases
databases 16

# Timeout
# timeout 300

# Rename dangerous commands (uncomment to use)
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# For more options, see https://redis.io/docs/management/config/