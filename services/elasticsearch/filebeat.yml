filebeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: false

filebeat.inputs:
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
  index: "logs-home-telemetry-%{+yyyy.MM.dd}"

setup.template.name: "logs-home-telemetry"
setup.template.pattern: "logs-home-telemetry-*"

logging.level: info
logging.to_stderr: true
