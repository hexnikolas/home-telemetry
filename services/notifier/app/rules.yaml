# can later be moved to a database

rules:
  # Example: SHT40 Humidity sensor (from your existing mqtt_client logic)
  - datastream_id: "7a4f551d-9a76-444d-a732-9d136ce02f16"
    name: "Living Room Humidity"
    condition: ">"
    threshold: 70.0
    priority: 5
    cooldown_minutes: 30

  # Example: NOUS A1T Power consumption
  - datastream_id: "08f166d2-398c-4ea2-959f-c146dc3406e1"
    name: "High Power Usage"
    condition: ">"
    threshold: 250.0
    priority: 8
    cooldown_minutes: 10

  - datastream_id: "d84925e1-c18c-4605-90be-3e0079e868f5"
    name: "High Temperature"
    condition: ">"
    threshold: 30.0
    priority: 8
    cooldown_minutes: 29

  # System metric: RabbitMQ queue size
  - type: "system_metric"
    metric: "rabbitmq_queue_size"
    name: "RabbitMQ Queue Backlog"
    condition: ">"
    threshold: 100
    priority: 8
    cooldown_minutes: 30
  
  # System metric: Dead Letter Queue (DLQ) - alert if any failed messages
  - type: "system_metric"
    metric: "rabbitmq_dlq_size"
    name: "Dead Letter Queue Has Failed Messages"
    condition: ">"
    threshold: 0
    priority: 9  # High priority - messages are failing permanently
    cooldown_minutes: 60
