services:
  jobs-worker:
    build:
      context: ../../
      dockerfile: services/jobs/Dockerfile
    container_name: home-telemetry-jobs-worker
    env_file:
      - .env
    command: python -m app.worker
    deploy:
      replicas: 1
    volumes:
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.from_url('redis://redis:6379/0'); r.get('jobs:worker_liveness')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - home-telemetry
    restart: unless-stopped

  jobs-scheduler:
    build:
      context: ../../
      dockerfile: services/jobs/Dockerfile
    container_name: home-telemetry-jobs-scheduler
    env_file:
      - .env
    command: python -m app.scheduler
    volumes:
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.from_url('redis://redis:6379/0'); r.get('jobs:scheduler_liveness')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - home-telemetry
    restart: unless-stopped

networks:
  home-telemetry:
    external: true
