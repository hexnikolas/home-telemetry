name: home-telemetry

services:
  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
    container_name: home-telemetry-api
    ports:
      - "8000:8000"
    env_file:
      - app/.env
    environment:
      DATABASE_HOST: home-telemetry-timescaledb
    restart: unless-stopped
    networks:
      - home-telemetry

networks:
  home-telemetry:
    external: true
